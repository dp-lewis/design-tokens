<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Design Tokens</title>
  <style>
    * { box-sizing: border-box; margin: 0; }
    body {
      font-family: system-ui, sans-serif;
      background: #f0f0f0;
      color: #333;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 2rem;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
    .landing {
      text-align: center;
      max-width: 480px;
    }
    .landing__title {
      font-size: 2rem;
      font-weight: 700;
      color: #1a1a1a;
      margin-bottom: 0.5rem;
    }
    .landing__desc {
      font-size: 0.9375rem;
      line-height: 1.6;
      color: #666;
      margin-bottom: 2.5rem;
    }
    .landing__links {
      display: flex;
      gap: 1rem;
      justify-content: center;
    }
    .landing__link {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.75rem;
      padding: 1.5rem 2rem;
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 8px;
      text-decoration: none;
      color: #333;
      flex: 1;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .landing__link:hover {
      border-color: #096dd2;
      box-shadow: 0 2px 8px rgba(9, 109, 210, 0.12);
    }
    .landing__link-icon {
      font-size: 2rem;
      line-height: 1;
    }
    .landing__link-title {
      font-size: 1rem;
      font-weight: 600;
    }
    .landing__link-desc {
      font-size: 0.8125rem;
      color: #888;
      line-height: 1.4;
    }
  </style>
</head>
<body>
  <div class="landing">
    <h1 class="landing__title">Design Tokens</h1>
    <p class="landing__desc">One component, many brands — zero duplication.<br>An interactive proof of concept for multi-brand theming.</p>
    <div class="landing__links">
      <a href="demo.html" class="landing__link">
        <span class="landing__link-icon">&lsaquo;/&rsaquo;</span>
        <span class="landing__link-title">Interactive Demo</span>
        <span class="landing__link-desc">Switch brands, layouts, and edit tokens live</span>
      </a>
      <a href="slides.html" class="landing__link">
        <span class="landing__link-icon">&marker;</span>
        <span class="landing__link-title">Presentation</span>
        <span class="landing__link-desc">Slide deck for the 15-minute talk</span>
      </a>
    </div>
  </div>
</body>
</html>
